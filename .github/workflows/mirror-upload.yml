name: Mirror Website and Upload

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  mirror-website:
    runs-on: ubuntu-latest
    env:
      ENABLE_FTP: ${{ secrets.ENABLE_FTP }}
      ENABLE_TELEGRAM: ${{ secrets.ENABLE_TELEGRAM }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install wget and zip
        run: sudo apt-get update && sudo apt-get install -y wget zip

      - name: Download Website
        id: download
        run: |
          wget -r -p -e robots=off "${{ secrets.WEBSITE_URL }}" \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --no-check-certificate -P ./website || true
          
          if [ -d "./website" ] && [ "$(ls -A ./website)" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ دانلود موفق" > status.txt
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "❌ دانلود ناموفق" > status.txt
          fi

      - name: Zip Downloaded Files
        id: zip
        if: steps.download.outputs.status == 'success'
        run: |
          zip -r website.zip ./website
          echo "status=success" >> $GITHUB_OUTPUT
          SIZE=$(du -h website.zip | cut -f1)
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Upload to FTP
        if: env.ENABLE_FTP == 'true' && steps.download.outputs.status == 'success'
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./
          stateful: false
          protocol: ftp
          port: "21"

      - name: Send Bale Notification
        if: env.ENABLE_TELEGRAM == 'true'
        run: |
          if [ "${{ steps.download.outputs.status }}" == "success" ]; then
            MESSAGE="✅ *عملیات Mirror موفق*%0A%0A"
            MESSAGE="$MESSAGE📦 منبع: ${{ secrets.WEBSITE_URL }}%0A"
            
            if [ "${{ env.ENABLE_FTP }}" == "true" ]; then
              MESSAGE="$MESSAGE📤 آپلود FTP: فعال%0A"
              MESSAGE="$MESSAGE🖥 سرور: ${{ secrets.FTP_SERVER }}%0A"
            else
              MESSAGE="$MESSAGE⏸ آپلود FTP: غیرفعال%0A"
            fi
            
            if [ "${{ steps.zip.outputs.size }}" != "" ]; then
              MESSAGE="$MESSAGE📦 حجم: ${{ steps.zip.outputs.size }}%0A"
            fi
          else
            MESSAGE="❌ *خطا در Mirror*%0A%0A"
            MESSAGE="$MESSAGE${{ steps.download.outputs.status }}%0A"
          fi
          
          MESSAGE="$MESSAGE⏰ زمان: $(date '+%Y-%m-%d %H:%M:%S')"
          
          curl -X POST "https://tapi.bale.ai/bot${{ secrets.BALE_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${{ secrets.BALE_CHAT_ID }}\", \"text\":\"$MESSAGE\", \"parse_mode\":\"Markdown\"}"
