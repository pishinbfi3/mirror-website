name: Bale Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Clone PornHub Downloader
        run: |
          git clone https://github.com/mariosemes/PornHub-downloader-python.git phdler_repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests
          pip install -r phdler_repo/requirements.txt

      - name: Run Bale Bot
        env:
          BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          WORKDIR: ${{ github.workspace }}/phdler_repo
          DOWNLOAD_DIR: ${{ github.workspace }}/downloads
        run: |
          python3 bale_bot.py
