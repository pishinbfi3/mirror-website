name: Telegram Bot CI

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    env:
      BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
      BALE_CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
      ENABLE_TELEGRAM: ${{ secrets.ENABLE_TELEGRAM }}
      ENABLE_FTP: ${{ secrets.ENABLE_FTP }}

    steps:
      - name: Checkout repository (bot code)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone PornHub-downloader-python
        run: |
          git clone https://github.com/mariosemes/PornHub-downloader-python.git PornHub-downloader-python-master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # پین به نسخه پایدار با چرخ‌های بیشتر
          python-version: '3.11'

      - name: Install system deps for lxml
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libxslt1-dev zlib1g-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install bot dependencies
          pip install -r requirements.txt
          # Install downloader dependencies (inside cloned folder)
          pip install -r PornHub-downloader-python-master/requirements.txt

      - name: Run bot (short test)
        run: |
          python bot.py &
          BOT_PID=$!
          sleep 5
          python PornHub-downloader-python-master/phdler.py start || true
          python PornHub-downloader-python-master/phdler.py list all || true
          kill $BOT_PID || true

      - name: Clean up
        if: always()
        run: echo "Workflow completed"
