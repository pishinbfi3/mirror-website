name: Telegram Bot CI

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    env:
      BALE_BOT_TOKEN: ${{ secrets.BALE_BOT_TOKEN }}
      BALE_CHAT_ID: ${{ secrets.BALE_CHAT_ID }}
      ENABLE_TELEGRAM: ${{ secrets.ENABLE_TELEGRAM }}
      ENABLE_FTP: ${{ secrets.ENABLE_FTP }}

    steps:
      - name: Checkout repository (bot code + downloader)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for lxml
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-dev libxslt1-dev zlib1g-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create necessary directories
        run: |
          mkdir -p downloader/logs downloader/handpicked downloader/temp_split

      - name: Run bot
        run: |
          python bot.py
